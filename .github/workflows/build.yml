name: Build macOS Binary

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.5'

      - name: Build for macOS arm64
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          cd autogitpull_go
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X github.com/blankstatic/autogitpull/autogitpull_go/internal/logic.AppVersion=${APP_VERSION}" -o autogitpull-macos-arm64 .
          chmod +x autogitpull-macos-arm64
          tar -czf autogitpull-macos-arm64.tar.gz autogitpull-macos-arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            autogitpull_go/autogitpull-macos-arm64
            autogitpull_go/autogitpull-macos-arm64.tar.gz
