name: Build macOS Binary

on:
  push:
    branches: [ main, master, go-app ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.5'

      - name: Build for both architectures
        run: |
          cd autogitpull_go
          GOOS=darwin GOARCH=amd64 go build -o autogitpull-macos-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o autogitpull-macos-arm64 .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            autogitpull_go/autogitpull-macos-amd64
            autogitpull_go/autogitpull-macos-arm64
