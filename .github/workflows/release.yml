name: Create macOS Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.5'

      - name: Build for macOS (both architectures)
        run: |
          cd autogitpull_go
          GOOS=darwin GOARCH=arm64 go build -o autogitpull-macos-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            autogitpull_go/autogitpull-macos-arm64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
