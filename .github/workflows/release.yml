name: macOS Release

on:
  push:
    tags: [ 'v*' ]
  release:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.5'

      - name: Build for macOS arm64
        env:
          APP_VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          cd autogitpull_go
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X github.com/blankstatic/autogitpull/autogitpull_go/internal/logic.AppVersion=${APP_VERSION}" -o autogitpull-macos-arm64 .
          chmod +x autogitpull-macos-arm64
          tar -czf autogitpull-macos-arm64.tar.gz autogitpull-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            autogitpull_go/autogitpull-macos-arm64
            autogitpull_go/autogitpull-macos-arm64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
